
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elo Rangliste (Overall)</title>

  <style>
    :root{
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #2563eb;
      --radius: 14px;
      --shadow: 0 8px 30px rgba(17, 24, 39, 0.08);
    }

    *{ box-sizing: border-box; }
    html, body { height: 100%; }

    body{
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    /* Full width */
    .page{
      width: 100%;
      padding: 14px 16px;
    }

    .toolbar{
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(246,247,251,0.92);
      backdrop-filter: blur(8px);
      padding: 10px 0 14px;
    }

    .toolbar-inner{
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
    }

    .title{
      font-size: 18px;
      font-weight: 900;
      margin-right: 10px;
    }

    .field{
      display: grid;
      gap: 6px;
      min-width: 160px;
    }

    label{
      font-size: 12px;
      color: var(--muted);
    }

    select, input{
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      font-size: 14px;
      outline: none;
      min-width: 220px;
    }

    input[type="search"]{ min-width: 240px; }
    input[type="number"]{ min-width: 140px; }

    .hint{
      margin-left: auto;
      font-size: 12px;
      color: var(--muted);
      padding-bottom: 6px;
      white-space: nowrap;
    }

    .panel{
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .kpis{
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 10px;
      margin: 12px 0;
    }

    @media (max-width: 1100px){
      .kpis{ grid-template-columns: 1fr 1fr; }
    }

    .kpi{
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
    }

    .kpi .label{
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .kpi .value{
      font-size: 18px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }
    .kpi .sub{
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .loading{
      padding: 12px 14px;
      border: 1px dashed var(--border);
      background: #fff;
      color: var(--muted);
      border-radius: 12px;
      margin-top: 12px;
      font-size: 13px;
      display:none;
    }

    .error{
      padding: 12px 14px;
      border: 1px solid #fecaca;
      background: #fff1f2;
      color: #9f1239;
      border-radius: 12px;
      margin-top: 12px;
      font-size: 13px;
      white-space: pre-wrap;
      display:none;
    }

    .table-wrap{
      overflow: auto;
      height: calc(100vh - 190px);
      border-radius: var(--radius);
    }

    @media (max-width: 1100px){
      .table-wrap{ height: 65vh; }
      select, input{ width: 100%; min-width: 220px; }
      .hint{ margin-left: 0; }
    }

    table{
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13.5px;
    }

    thead th{
      position: sticky;
      top: 0;
      z-index: 5;
      background: #fbfbfd;
      border-bottom: 1px solid var(--border);
      padding: 12px 10px;
      text-align: left;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }

    tbody td{
      border-bottom: 1px solid #f1f5f9;
      padding: 10px 10px;
      white-space: nowrap;
    }

    tbody tr:nth-child(odd){ background: #fcfcff; }
    tbody tr:hover{ background: #eef2ff; }

    .num{ text-align: right; font-variant-numeric: tabular-nums; }

    /* Disziplin-Pills */
    .pills{
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 2px;
    }
    .pill{
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      padding: 8px 10px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      user-select:none;
    }
    .pill.active{
      border-color: rgba(37,99,235,0.35);
      background: rgba(37,99,235,0.10);
      color: #1d4ed8;
      font-weight: 800;
    }

    /* Auf sehr schmalen Screens lieber Select statt Pills */
    .discipline-select-only{ display:none; }
    @media (max-width: 700px){
      .pills{ display:none; }
      .discipline-select-only{ display:block; }
    }

    /* Spieler-Link: echter <a> => Rechtsklick/Long‑Press funktioniert */
    .player-link{
      color: var(--primary);
      text-decoration: none;
      font-weight: 650;
    }
    .player-link:hover{
      text-decoration: underline;
    }
    .player-link::after{
      content: " ›";
      color: rgba(37,99,235,0.55);
      font-weight: 700;
    }

    .small{
      font-size: 12px;
      color: var(--muted);
      margin-top: 10px;
    }
    code{
      background: rgba(17,24,39,0.04);
      padding: 2px 6px;
      border-radius: 8px;
      border: 1px solid rgba(17,24,39,0.06);
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="toolbar">
      <div class="toolbar-inner">
        <div class="title">ELO Rangliste</div>

        <div class="field" style="min-width: 320px;">
          <label>Disziplin</label>
          <div class="pills" id="disciplinePills"></div>
          <select id="discipline" class="discipline-select-only"></select>
        </div>

        <div class="field">
          <label for="search">Spieler suchen</label>
          <input id="search" type="search" placeholder="Name enthält …" autocomplete="off" />
        </div>

        <div class="field">
          <label for="minGames">Min. Spiele</label>
          <input id="minGames" type="number" min="0" step="1" value="0" />
        </div>

        <div class="field">
          <label for="rows">Zeilen</label>
          <select id="rows">
            <option value="50">50</option>
            <option value="100" selected>100</option>
            <option value="200">200</option>
            <option value="999999">Alle</option>
          </select>
        </div>

        <div class="hint">Nur der Spielername ist klickbar (Rechtsklick/Long‑Press möglich)</div>
      </div>

      <div class="kpis" id="kpis"></div>
      <div class="loading" id="loadingBox">Lade Daten …</div>
      <div class="error" id="errorBox"></div>
    </div>

    <div class="panel">
      <div class="table-wrap">
        <table id="ranking-table">
          <thead>
            <tr>
              <th data-key="rank">Platz</th>
              <th data-key="player">Spieler</th>
              <th data-key="elo" class="num">Elo Punkte</th>
              <th data-key="games" class="num">Spiele</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="small">
      Datenquelle: <code>eloRangliste.json</code> (enthält <code>elo_ratings</code> &amp; <code>games_played</code>)
    </div>
  </div>

  <script>
    "use strict";

    // ===== State =====
    let rawData = null;
    let disciplines = [];
    let currentDiscipline = "";
    let sortKey = "elo";
    let sortDir = "desc"; // default: Elo absteigend

    // Base URL für Player-GUI (absolut, wie von dir gewünscht)
    const PLAYER_GUI_BASE =
      "https://tobroc.github.io/kickertool_dyp_data/eloRanglistePlayerGUI.html";

    // ===== DOM helpers =====
    const $ = (id) => document.getElementById(id);
    const tbody = () => document.querySelector("#ranking-table tbody");

    function showLoading(show){ $("loadingBox").style.display = show ? "block" : "none"; }
    function showError(msg){
      const box = $("errorBox");
      box.style.display = "block";
      box.textContent = msg;
    }
    function clearError(){
      const box = $("errorBox");
      box.style.display = "none";
      box.textContent = "";
    }

    function fmtElo(n){
      return Number.isFinite(n) ? n.toFixed(2) : "–";
    }

    // ===== Data load =====
    async function fetchData(){
      const candidates = [
        "eloRangliste.json",
        "https://tobroc.github.io/kickertool_dyp_data/eloRangliste.json"
      ];
      for (const url of candidates){
        try{
          const r = await fetch(url, { cache: "no-store" });
          if (!r.ok) continue;
          return await r.json();
        }catch(e){}
      }
      return null;
    }

    function collectDisciplines(elo_ratings){
      const set = new Set();
      for (const player in elo_ratings){
        const obj = elo_ratings[player];
        if (!obj) continue;
        for (const d in obj) set.add(d);
      }
      return Array.from(set).sort((a,b) => a.localeCompare(b, "de"));
    }

    function preferredDiscipline(list){
      // bevorzugt: monster_dyp (exakt)
      if (list.includes("monster_dyp")) return "monster_dyp";
      return list[0] || "";
    }

    // ===== UI: discipline pills + select =====
    function renderDisciplineControls(){
      const pills = $("disciplinePills");
      pills.innerHTML = "";

      disciplines.forEach(d => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "pill" + (d === currentDiscipline ? " active" : "");
        b.textContent = d;
        b.addEventListener("click", () => {
          currentDiscipline = d;
          $("discipline").value = d;
          renderDisciplineControls();
          updateTable();
        });
        pills.appendChild(b);
      });

      const sel = $("discipline");
      sel.innerHTML = disciplines.map(d => `<option value="${d}">${d}</option>`).join("");
      sel.value = currentDiscipline;
      sel.onchange = () => {
        currentDiscipline = sel.value;
        renderDisciplineControls();
        updateTable();
      };
    }

    // ===== Build base rows for current discipline =====
    function buildRowsForDiscipline(discipline){
      const { elo_ratings, games_played } = rawData;

      const rows = [];
      for (const player of Object.keys(elo_ratings)){
        const rObj = elo_ratings[player];
        const gObj = games_played[player];

        if (!rObj || rObj[discipline] === undefined) continue;

        const elo = Number(rObj[discipline]);
        const games = (gObj && gObj[discipline] != null) ? Number(gObj[discipline]) : 0;

        rows.push({ player, elo, games });
      }
      return rows;
    }

    // ===== Filter + Sort =====
    function applyFilter(rows){
      const q = ($("search").value || "").trim().toLowerCase();
      const minGames = Number($("minGames").value || 0);

      let out = rows;
      if (q) out = out.filter(r => r.player.toLowerCase().includes(q));
      if (Number.isFinite(minGames) && minGames > 0) out = out.filter(r => r.games >= minGames);

      return out;
    }

    function sortRows(rows){
      const dir = (sortDir === "asc") ? 1 : -1;

      const sorted = rows.slice().sort((a,b) => {
        if (sortKey === "player"){
          return dir * a.player.localeCompare(b.player, "de");
        }
        if (sortKey === "elo"){
          return dir * ((a.elo || 0) - (b.elo || 0));
        }
        if (sortKey === "games"){
          return dir * ((a.games || 0) - (b.games || 0));
        }
        return 0;
      });

      return sorted.map((r, idx) => ({ ...r, rank: idx + 1 }));
    }

    // ===== KPIs =====
    function renderKPIs(allSortedRows){
      const el = $("kpis");
      const count = allSortedRows.length;

      const avgElo = count ? (allSortedRows.reduce((s,r) => s + (r.elo || 0), 0) / count) : 0;
      const maxElo = count ? Math.max(...allSortedRows.map(r => r.elo || 0)) : 0;
      const minElo = count ? Math.min(...allSortedRows.map(r => r.elo || 0)) : 0;

      const top = allSortedRows[0];

      el.innerHTML = `
        <div class="kpi">
          <div class="label">Disziplin</div>
          <div class="value">${currentDiscipline || "–"}</div>
          <div class="sub">Auswahl</div>
        </div>
        <div class="kpi">
          <div class="label">Spieler</div>
          <div class="value">${count}</div>
          <div class="sub">mit Rating (nach Filter)</div>
        </div>
        <div class="kpi">
          <div class="label">Ø Elo</div>
          <div class="value">${count ? avgElo.toFixed(1) : "–"}</div>
          <div class="sub">Min ${count ? minElo.toFixed(1) : "–"} / Max ${count ? maxElo.toFixed(1) : "–"}</div>
        </div>
        <div class="kpi">
          <div class="label">#1</div>
          <div class="value">${top ? top.player : "–"}</div>
          <div class="sub">${top ? (fmtElo(top.elo) + " (" + top.games + " Spiele)") : ""}</div>
        </div>
      `;
    }

    // ===== Render Table (DOM-sicherer Link-Aufbau) =====
    function updateTable(){
      if (!rawData) return;

      const base = buildRowsForDiscipline(currentDiscipline);
      const filtered = applyFilter(base);
      const sortedWithRank = sortRows(filtered);

      renderKPIs(sortedWithRank);

      const limit = Number($("rows").value || 100);
      const visible = sortedWithRank.slice(0, limit);

      const tb = tbody();
      tb.innerHTML = "";

      for (const r of visible){
        const tr = document.createElement("tr");

        const tdRank = document.createElement("td");
        tdRank.className = "num";
        tdRank.textContent = String(r.rank);

        const tdPlayer = document.createElement("td");
        const a = document.createElement("a");
        a.className = "player-link";
        a.href = PLAYER_GUI_BASE + "?player=" + encodeURIComponent(r.player);
        a.textContent = r.player; // ✅ zeigt nur den Namen (z.B. "Ali Al-Musali")
        tdPlayer.appendChild(a);

        const tdElo = document.createElement("td");
        tdElo.className = "num";
        tdElo.textContent = fmtElo(r.elo);

        const tdGames = document.createElement("td");
        tdGames.className = "num";
        tdGames.textContent = Number.isFinite(r.games) ? String(r.games) : "–";

        tr.appendChild(tdRank);
        tr.appendChild(tdPlayer);
        tr.appendChild(tdElo);
        tr.appendChild(tdGames);

        tb.appendChild(tr);
      }

      // Optional: iframe-height to parent
      try{
        const h = document.documentElement.scrollHeight;
        window.parent.postMessage({ type: "eloHeight", height: h }, "*");
      }catch(e){}
    }

    // ===== Header sorting clicks =====
    function installSorting(){
      document.querySelectorAll("#ranking-table thead th").forEach(th => {
        const key = th.getAttribute("data-key");
        if (!key) return;

        th.addEventListener("click", () => {
          if (key === "rank") {
            // Platz ist abgeleitet → zurück zu Elo desc
            sortKey = "elo";
            sortDir = "desc";
          } else if (sortKey === key){
            sortDir = (sortDir === "desc") ? "asc" : "desc";
          } else {
            sortKey = key;
            sortDir = (key === "player") ? "asc" : "desc";
          }
          updateTable();
        });
      });
    }

    // ===== Init =====
    document.addEventListener("DOMContentLoaded", async () => {
      showLoading(true);
      clearError();

      rawData = await fetchData();

      showLoading(false);

      if (!rawData){
        showError("Fehler: eloRangliste.json konnte nicht geladen werden.");
        return;
      }

      if (!rawData.elo_ratings || !rawData.games_played){
        showError("Fehler: JSON-Format unerwartet. Erwartet: elo_ratings + games_played.");
        return;
      }

      disciplines = collectDisciplines(rawData.elo_ratings);
      currentDiscipline = preferredDiscipline(disciplines);

      renderDisciplineControls();
      installSorting();

      $("search").addEventListener("input", updateTable);
      $("minGames").addEventListener("input", updateTable);
      $("rows").addEventListener("change", updateTable);

      updateTable();
    });
  </script>
</body>
</html>
