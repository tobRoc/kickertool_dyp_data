<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elo Rangliste – Historie</title>

  <!-- Apache ECharts (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@s.min.js</script>

  <style>
    :root{
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #2563eb;
      --pos: #059669;
      --neg: #dc2626;
      --radius: 14px;
      --shadow: 0 8px 30px rgba(17, 24, 39, 0.08);
    }

    * { box-sizing: border-box; }
    body{
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    /* Full width: kein 1200px Container mehr */
    .page{
      width: 100%;
      padding: 14px 16px;
    }

    .toolbar{
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(246,247,251,0.9);
      backdrop-filter: blur(8px);
      padding: 10px 0 14px;
    }

    .toolbar-inner{
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .title{
      font-size: 18px;
      font-weight: 700;
      margin-right: 10px;
    }

    label{
      font-size: 13px;
      color: var(--muted);
    }

    select, input{
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      font-size: 14px;
      outline: none;
      min-width: 260px;
    }

    .grid{
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 14px;
      align-items: start;
    }

    @media (max-width: 1100px){
      .grid{ grid-template-columns: 1fr; }
      select, input{ min-width: 220px; width: 100%; }
    }

    .panel{
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    /* Left: table */
    .table-panel{
      overflow: hidden;
    }

    .table-wrap{
      height: calc(100vh - 160px);
      overflow: auto;
    }

    @media (max-width: 1100px){
      .table-wrap{ height: 60vh; }
    }

    table{
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13.5px;
    }

    thead th{
      position: sticky;
      top: 0;
      z-index: 5;
      background: #fbfbfd;
      border-bottom: 1px solid var(--border);
      padding: 12px 10px;
      text-align: left;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }

    tbody td{
      border-bottom: 1px solid #f1f5f9;
      padding: 10px 10px;
      vertical-align: top;
      white-space: nowrap;
    }

    tbody tr:nth-child(odd){ background: #fcfcff; }
    tbody tr:hover{ background: #eef2ff; cursor: pointer; }

    .num{ text-align: right; font-variant-numeric: tabular-nums; }
    .delta.pos{ color: var(--pos); font-weight: 700; }
    .delta.neg{ color: var(--neg); font-weight: 700; }
    .muted{ color: var(--muted); }

    /* Right: chart + KPIs */
    .side{
      position: sticky;
      top: 78px; /* unter toolbar */
      padding: 12px;
    }
    @media (max-width: 1100px){
      .side{ position: static; }
    }

    .kpis{
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .kpi{
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
    }
    .kpi .label{
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .kpi .value{
      font-size: 18px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }
    .kpi .sub{
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }

    .error{
      padding: 12px 14px;
      border: 1px solid #fecaca;
      background: #fff1f2;
      color: #9f1239;
      border-radius: 12px;
      margin-top: 12px;
    }

    .hint{
      font-size: 12px;
      color: var(--muted);
      margin-left: auto;
    }
  </style>
</head>

<body>
  <div class="page">

    <div class="toolbar">
      <div class="toolbar-inner">
        <div class="title">ELO: Historie</div>

        <div>
          <label for="player">Spieler</label><br />
          <select id="player"></select>
        </div>

        <div>
          <label for="rows">Zeilen</label><br />
          <select id="rows">
            <option value="50">50</option>
            <option value="100" selected>100</option>
            <option value="200">200</option>
            <option value="999999">Alle</option>
          </select>
        </div>

        <div class="hint">Tipp: Tabellenzeile klicken → Punkt im Chart anzeigen</div>
      </div>
    </div>

    <div class="grid">
      <!-- TABLE -->
      <div class="panel table-panel">
        <div class="table-wrap">
          <table id="player-table">
            <thead>
              <tr>
                <th data-sort="date">Datum</th>
                <th>Team 1 Spieler 1</th>
                <th class="num">Elo</th>
                <th>Team 1 Spieler 2</th>
                <th class="num">Elo</th>
                <th>Team 2 Spieler 1</th>
                <th class="num">Elo</th>
                <th>Team 2 Spieler 2</th>
                <th class="num">Elo</th>
                <th class="num">Δ (Spieler)</th>
                <th class="num">Ergebnis</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <!-- CHART -->
      <div class="panel side">
        <div id="eloChart" style="height: 420px;"></div>
        <div class="kpis">
          <div class="kpi">
            <div class="label">Aktueller Elo</div>
            <div class="value" id="kpi-current">–</div>
            <div class="sub" id="kpi-current-date"> </div>
          </div>
          <div class="kpi">
            <div class="label">Veränderung (gesamt)</div>
            <div class="value" id="kpi-change">–</div>
            <div class="sub" id="kpi-first"> </div>
          </div>
          <div class="kpi">
            <div class="label">Peak Elo</div>
            <div class="value" id="kpi-peak">–</div>
            <div class="sub" id="kpi-peak-date"> </div>
          </div>
          <div class="kpi">
            <div class="label">Spiele</div>
            <div class="value" id="kpi-games">–</div>
            <div class="sub">im Datensatz</div>
          </div>
        </div>

        <div id="errorBox" class="error" style="display:none;"></div>
      </div>
    </div>
  </div>

  <script>
    let eloChart = null;
    let globalData = null;
    let currentChron = [];
    let sortState = { key: "date", dir: "desc" };

    function showError(msg){
      const box = document.getElementById("errorBox");
      box.style.display = "block";
      box.textContent = msg;
    }

    async function fetchData() {
      try {
        // relative URL - passt zu GitHub Pages im selben Ordner
        const response = await fetch("eloRanglisteDetailed.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP error ${response.status}`);
        }
        return await response.json();
      } catch (error) {
        console.error("Fehler beim Laden der Daten:", error);
        showError("Fehler beim Laden der Daten: " + error.message);
        return null;
      }
    }

    function toNumber(x){
      const n = Number(x);
      return Number.isFinite(n) ? n : null;
    }

    function parseMatch(matchArr){
      // Erwartetes Format (wie in deiner bestehenden Datei):
      // [date, t1p1, t1elo1, t1p2, t1elo2, t2p1, t2elo1, t2p2, t2elo2, result1, result2]
      // (Wenn Ergebnis bereits "1-0" ist, behandeln wir es auch)
      const date = matchArr[0];
      const t1p1 = matchArr[1];
      const t1e1 = toNumber(matchArr[2]);
      const t1p2 = matchArr[3];
      const t1e2 = toNumber(matchArr[4]);
      const t2p1 = matchArr[5];
      const t2e1 = toNumber(matchArr[6]);
      const t2p2 = matchArr[7];
      const t2e2 = toNumber(matchArr[8]);

      let result = "";
      if (typeof matchArr[9] === "string" && matchArr[9].includes("-")) {
        result = matchArr[9];
      } else {
        const r1 = matchArr[9];
        const r2 = matchArr[10];
        if (r1 != null && r2 != null) result = `${r1}-${r2}`;
      }

      return { date, t1p1, t1e1, t1p2, t1e2, t2p1, t2e1, t2p2, t2e2, result };
    }

    function getSelectedElo(m, selectedPlayer){
      if (m.t1p1 === selectedPlayer) return m.t1e1;
      if (m.t1p2 === selectedPlayer) return m.t1e2;
      if (m.t2p1 === selectedPlayer) return m.t2e1;
      if (m.t2p2 === selectedPlayer) return m.t2e2;
      return null;
    }

    function stableChron(matches, selectedPlayer){
      // stabil sortiert nach Datum (ISO yyyy-mm-dd => lexicographic ok)
      const parsed = matches.map((arr, idx) => {
        const m = parseMatch(arr);
        const selectedElo = getSelectedElo(m, selectedPlayer);
        return { ...m, selectedElo, _idx: idx };
      }).filter(m => m.selectedElo != null);

      parsed.sort((a,b) => {
        if (a.date === b.date) return a._idx - b._idx;
        return a.date.localeCompare(b.date);
      });

      // Delta auf chronologischer Basis
      for (let i=0; i<parsed.length; i++){
        const prev = i>0 ? parsed[i-1].selectedElo : null;
        parsed[i].delta = (prev == null) ? null : (parsed[i].selectedElo - prev);
      }
      return parsed;
    }

    function formatElo(n){
      if (n == null) return "–";
      return n.toFixed(1);
    }

    function formatDelta(d){
      if (d == null) return "–";
      const s = (d >= 0 ? "+" : "") + d.toFixed(1);
      return s;
    }

    function setKPIs(chron){
      const games = chron.length;
      document.getElementById("kpi-games").textContent = games.toString();

      if (!games){
        document.getElementById("kpi-current").textContent = "–";
        document.getElementById("kpi-change").textContent = "–";
        document.getElementById("kpi-peak").textContent = "–";
        document.getElementById("kpi-current-date").textContent = "";
        document.getElementById("kpi-first").textContent = "";
        document.getElementById("kpi-peak-date").textContent = "";
        return;
      }

      const first = chron[0];
      const last  = chron[games-1];

      const change = last.selectedElo - first.selectedElo;

      let peak = first;
      for (const m of chron){
        if (m.selectedElo > peak.selectedElo) peak = m;
      }

      document.getElementById("kpi-current").textContent = formatElo(last.selectedElo);
      document.getElementById("kpi-current-date").textContent = "Stand: " + last.date;

      const changeEl = document.getElementById("kpi-change");
      changeEl.textContent = (change>=0?"+":"") + change.toFixed(1);
      changeEl.style.color = change>=0 ? "var(--pos)" : "var(--neg)";
      document.getElementById("kpi-first").textContent = `Start: ${first.date} (${formatElo(first.selectedElo)})`;

      document.getElementById("kpi-peak").textContent = formatElo(peak.selectedElo);
      document.getElementById("kpi-peak-date").textContent = "Datum: " + peak.date;
    }

    function renderChart(chron, playerName){
      const el = document.getElementById("eloChart");
      if (!eloChart){
        eloChart = echarts.init(el);
        window.addEventListener("resize", () => eloChart.resize());
      }

      const points = chron.map(m => [m.date, m.selectedElo]);

      const option = {
        title: {
          text: `Elo-Verlauf: ${playerName}`,
          left: "center",
          textStyle: { fontWeight: 800, fontSize: 14 }
        },
        tooltip: {
          trigger: "axis",
          axisPointer: { type: "line" },
          valueFormatter: (v) => (typeof v === "number" ? v.toFixed(1) : v)
        },
        grid: { left: 45, right: 15, top: 55, bottom: 55 },
        xAxis: { type: "time" },
        yAxis: { type: "value", scale: true },
        dataZoom: [
          { type: "inside", xAxisIndex: 0 },
          { type: "slider", xAxisIndex: 0, height: 18, bottom: 20 }
        ],
        series: [{
          name: "Elo",
          type: "line",
          data: points,
          showSymbol: false,
          smooth: true,
          lineStyle: { width: 2, color: "#2563eb" },
          areaStyle: { opacity: 0.08, color: "#2563eb" }
        }]
      };

      eloChart.setOption(option, true);
    }

    function applySort(rows){
      // rows ist "view" (z.B. desc oder asc) – wir sortieren aktuell nur Datum
      if (sortState.key !== "date") return rows;

      const sorted = rows.slice().sort((a,b) => {
        const cmp = a.date.localeCompare(b.date);
        return sortState.dir === "asc" ? cmp : -cmp;
      });
      return sorted;
    }

    function renderTable(chron, selectedPlayer){
      const limit = Number(document.getElementById("rows").value || 100);

      // Für Tabelle: standardmäßig absteigend (neueste oben)
      // Aber wir respektieren Sort-Toggle auf Datum
      let view = chron.slice();
      if (sortState.key === "date"){
        // sortState kann asc/desc sein
        view = applySort(view);
      } else {
        // fallback
        view = view.slice().reverse();
      }

      // Für absteigend default:
      if (sortState.key === "date" && sortState.dir === "desc"){
        // date-sort desc entspricht reverse von chron (chron ist asc)
        // applySort hat es bereits umgesetzt, ok
      }

      const tbody = document.querySelector("#player-table tbody");
      tbody.innerHTML = "";

      const sliced = view.slice(0, limit);

      sliced.forEach(m => {
        const tr = document.createElement("tr");
        tr.dataset.chronIndex = String(m._idx); // wird unten auf "echte" Index gemappt

        const deltaClass = (m.delta == null) ? "" : (m.delta >= 0 ? "pos" : "neg");

        tr.innerHTML = `
          <td>${m.date}</td>
          <td>${m.t1p1 ?? ""}</td>
          <td class="num">${formatElo(m.t1e1)}</td>
          <td>${m.t1p2 ?? ""}</td>
          <td class="num">${formatElo(m.t1e2)}</td>
          <td>${m.t2p1 ?? ""}</td>
          <td class="num">${formatElo(m.t2e1)}</td>
          <td>${m.t2p2 ?? ""}</td>
          <td class="num">${formatElo(m.t2e2)}</td>
          <td class="num delta ${deltaClass}">${formatDelta(m.delta)}</td>
          <td class="num">${m.result ?? ""}</td>
        `;

        tr.addEventListener("click", () => {
          // Finde Index in chron (chron ist asc); wir suchen über _idx oder über Date+Elo
          const idx = currentChron.findIndex(x => x._idx === m._idx);
          if (idx >= 0 && eloChart){
            eloChart.dispatchAction({ type: "showTip", seriesIndex: 0, dataIndex: idx });
            eloChart.dispatchAction({ type: "highlight", seriesIndex: 0, dataIndex: idx });
          }
        });

        tbody.appendChild(tr);
      });
    }

    function updateUI(){
      if (!globalData || !globalData.player_data){
        showError("Datenformat unerwartet: 'player_data' nicht gefunden.");
        return;
      }

      const playerSelect = document.getElementById("player");
      const selectedPlayer = playerSelect.value;
      const matches = globalData.player_data[selectedPlayer] || [];

      const chron = stableChron(matches, selectedPlayer);
      currentChron = chron;

      setKPIs(chron);
      renderChart(chron, selectedPlayer);

      // Default: newest first → date desc
      // Falls user toggled sorting via click, bleibt sortState erhalten
      renderTable(chron, selectedPlayer);

      // Optional: dem Parent (WordPress) Höhe schicken, damit iframe sauber passt
      // (funktioniert auch cross-origin via postMessage)
      try {
        const h = document.documentElement.scrollHeight;
        window.parent.postMessage({ type: "eloHeight", height: h }, "*");
      } catch(e) {}
    }

    document.addEventListener("DOMContentLoaded", async () => {
      globalData = await fetchData();
      if (!globalData) return;

      const playerSelect = document.getElementById("player");
      const rowsSelect = document.getElementById("rows");

      const players = Object.keys(globalData.player_data || {}).sort((a,b) => a.localeCompare(b, "de"));
      if (!players.length){
        showError("Keine Spieler gefunden (player_data leer).");
        return;
      }

      playerSelect.innerHTML = players.map(p => `<option value="${p}">${p}</option>`).join("");
      playerSelect.value = players[0];

      playerSelect.addEventListener("change", updateUI);
      rowsSelect.addEventListener("change", updateUI);

      // Sort toggle (Datum)
      document.querySelector('th[data-sort="date"]').addEventListener("click", () => {
        sortState.dir = (sortState.dir === "desc") ? "asc" : "desc";
        updateUI();
      });

      updateUI();
    });
  </script>
</body>
</html>
