<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ELO: Historie Spieler</title>

  <style>
    :root{
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #2563eb;
      --pos: #059669;
      --neg: #dc2626;
      --radius: 14px;
      --shadow: 0 8px 30px rgba(17, 24, 39, 0.08);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body{
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    /* Full width Layout */
    .page{
      width: 100%;
      padding: 14px 16px;
    }

    .toolbar{
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(246,247,251,0.92);
      backdrop-filter: blur(8px);
      padding: 10px 0 14px;
    }

    .toolbar-inner{
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .title{
      font-size: 18px;
      font-weight: 900;
      margin-right: 10px;
    }

    .field{
      display: grid;
      gap: 6px;
    }

    label{
      font-size: 12px;
      color: var(--muted);
    }

    select, input{
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      font-size: 14px;
      outline: none;
      min-width: 240px;
    }

    input[type="search"]{ min-width: 220px; }

    .hint{
      margin-left: auto;
      font-size: 12px;
      color: var(--muted);
      padding-bottom: 6px;
    }

    .grid{
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 14px;
      align-items: start;
    }

    @media (max-width: 1100px){
      .grid{ grid-template-columns: 1fr; }
      select, input{ min-width: 220px; width: 100%; }
      .hint{ margin-left: 0; }
    }

    .panel{
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    /* Table */
    .table-panel{ overflow: hidden; }

    .table-wrap{
      height: calc(100vh - 170px);
      overflow: auto;
    }

    @media (max-width: 1100px){
      .table-wrap{ height: 60vh; }
    }

    table{
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13.5px;
    }

    thead th{
      position: sticky;
      top: 0;
      z-index: 5;
      background: #fbfbfd;
      border-bottom: 1px solid var(--border);
      padding: 12px 10px;
      text-align: left;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }

    tbody td{
      border-bottom: 1px solid #f1f5f9;
      padding: 10px 10px;
      vertical-align: top;
      white-space: nowrap;
    }

    tbody tr:nth-child(odd){ background: #fcfcff; }
    tbody tr:hover{ background: #eef2ff; cursor: pointer; }

    .num{ text-align: right; font-variant-numeric: tabular-nums; }
    .delta.pos{ color: var(--pos); font-weight: 900; }
    .delta.neg{ color: var(--neg); font-weight: 900; }

    /* Sidebar */
    .side{
      position: sticky;
      top: 78px;
      padding: 12px;
    }
    @media (max-width: 1100px){
      .side{ position: static; }
    }

    .kpis{
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .kpi{
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
    }
    .kpi .label{
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .kpi .value{
      font-size: 18px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }
    .kpi .sub{
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .notice{
      padding: 10px 12px;
      border: 1px dashed var(--border);
      border-radius: 12px;
      color: var(--muted);
      background: #fff;
      font-size: 13px;
      margin-top: 10px;
    }

    .error{
      padding: 12px 14px;
      border: 1px solid #fecaca;
      background: #fff1f2;
      color: #9f1239;
      border-radius: 12px;
      margin-top: 12px;
      font-size: 13px;
      white-space: pre-wrap;
    }

    .topline{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
    }

    .status{
      font-size:12px;
      color: var(--muted);
    }

    .btn{
      border: 1px solid var(--border);
      background: #fff;
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn:hover{ background:#f9fafb; }
  </style>
</head>

<body>
  <div class="page">
    <div class="toolbar">
      <div class="toolbar-inner">
        <div class="title">ELO: Historie</div>

        <div class="field">
          <label for="player">Spieler</label>
          <select id="player"></select>
        </div>

        <div class="field">
          <label for="playerFilter">Spieler filtern</label>
          <input id="playerFilter" type="search" placeholder="z.B. Tobias…" autocomplete="off" />
        </div>

        <div class="field">
          <label for="rows">Zeilen</label>
          <select id="rows">
            <option value="50">50</option>
            <option value="100" selected>100</option>
            <option value="200">200</option>
            <option value="999999">Alle</option>
          </select>
        </div>

        <div class="hint">Tipp: Tabellenzeile klicken → Punkt im Chart anzeigen</div>
      </div>
    </div>

    <div class="grid">
      <!-- TABLE -->
      <div class="panel table-panel">
        <div class="table-wrap">
          <table id="player-table">
            <thead>
              <tr>
                <th id="sortDate" title="Sortieren nach Datum">Datum ▲▼</th>
                <th>Team 1 Spieler 1</th>
                <th class="num">Elo</th>
                <th>Team 1 Spieler 2</th>
                <th class="num">Elo</th>
                <th>Team 2 Spieler 1</th>
                <th class="num">Elo</th>
                <th>Team 2 Spieler 2</th>
                <th class="num">Elo</th>
                <th class="num" title="Elo-Änderung für ausgewählten Spieler">Δ</th>
                <th class="num">Ergebnis</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <!-- CHART + KPIs -->
      <div class="panel side">
        <div class="topline">
          <div class="status" id="chartStatus">Diagramm wird geladen…</div>
          <button class="btn" id="retryChart" type="button" title="ECharts erneut laden">Neu laden</button>
        </div>

        <div id="eloChart" style="height: 420px; margin-top: 8px;"></div>

        <div class="kpis">
          <div class="kpi">
            <div class="label">Aktueller Elo</div>
            <div class="value" id="kpi-current">–</div>
            <div class="sub" id="kpi-current-date"></div>
          </div>
          <div class="kpi">
            <div class="label">Veränderung (gesamt)</div>
            <div class="value" id="kpi-change">–</div>
            <div class="sub" id="kpi-first"></div>
          </div>
          <div class="kpi">
            <div class="label">Peak Elo</div>
            <div class="value" id="kpi-peak">–</div>
            <div class="sub" id="kpi-peak-date"></div>
          </div>
          <div class="kpi">
            <div class="label">Spiele</div>
            <div class="value" id="kpi-games">–</div>
            <div class="sub">im Datensatz</div>
          </div>
        </div>

        <div id="chartHint" class="notice" style="display:none;"></div>
        <div id="errorBox" class="error" style="display:none;"></div>
      </div>
    </div>
  </div>

  <script>
    "use strict";

    // ========= DOM Helpers =========
    function $(id){ return document.getElementById(id); }

    function showError(msg){
      const box = $("errorBox");
      box.style.display = "block";
      box.textContent = msg;
    }
    function clearError(){
      const box = $("errorBox");
      box.style.display = "none";
      box.textContent = "";
    }

    function setChartStatus(text){
      $("chartStatus").textContent = text;
    }

    function showChartHint(msg){
      const el = $("chartHint");
      el.style.display = "block";
      el.textContent = msg;
    }
    function hideChartHint(){
      const el = $("chartHint");
      el.style.display = "none";
      el.textContent = "";
    }

    function fmtElo(n){
      return (Number.isFinite(n) ? n.toFixed(1) : "–");
    }
    function fmtDelta(d){
      if (!Number.isFinite(d)) return "–";
      return (d >= 0 ? "+" : "") + d.toFixed(1);
    }
    function deltaClass(d){
      if (!Number.isFinite(d)) return "";
      return d >= 0 ? "pos" : "neg";
    }

    function safePostHeight(){
      try{
        const h = document.documentElement.scrollHeight;
        window.parent.postMessage({ type: "eloHeight", height: h }, "*");
      }catch(e){}
    }

    // ========= URL Param Handling (player=...) =========
    // URLSearchParams ist die Standard-Web-API für Query-Strings. [1](https://devdoc.net/web/developer.mozilla.org/en-US/docs/Web/API/History/pushState.html)
    function normalizePlayerName(s){
      return (s || "").trim().replace(/\s+/g, " ").toLowerCase();
    }

    function getPlayerFromUrl(allPlayers){
      const params = new URLSearchParams(window.location.search);
      const p = params.get("player");
      if (!p) return null;

      // 1) exakter Match
      if (allPlayers.includes(p)) return p;

      // 2) toleranter Match (Case/Spaces)
      const pn = normalizePlayerName(p);
      const found = allPlayers.find(x => normalizePlayerName(x) === pn);
      return found || null;
    }

    // replaceState aktualisiert URL ohne Reload und ohne neuen History-Eintrag. [2](https://kickertool.com/)
    function setPlayerToUrl(player){
      const url = new URL(window.location.href);
      if (player) url.searchParams.set("player", player);
      else url.searchParams.delete("player");
      history.replaceState(null, "", url);
    }

    // ========= ECharts Loader (robust) =========
    // Tries local first (recommended), then CDNs.
    function loadScript(url){
      return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = url;
        s.async = true;
        s.onload = () => resolve(url);
        s.onerror = () => reject(new Error("Load failed: " + url));
        document.head.appendChild(s);
      });
    }

    async function ensureECharts(){
      // Already available?
      if (typeof window.echarts !== "undefined") return { ok: true, source: "already" };

      // Try sources in order:
      const sources = [
        "./vendor/echarts.min.js", // local (put file here for max reliability)
        "https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js",
        "https://unpkg.com/echarts@5/dist/echarts.min.js"
      ];

      for (const src of sources){
        try{
          const loadedFrom = await loadScript(src);
          if (typeof window.echarts !== "undefined"){
            return { ok: true, source: loadedFrom };
          }
        }catch(e){
          // try next
        }
      }
      return { ok: false, source: null };
    }

    // ========= Data Loading =========
    async function fetchData(){
      const candidates = [
        "eloRanglisteDetailed.json",
        "https://tobroc.github.io/kickertool_dyp_data/eloRanglisteDetailed.json"
      ];

      for (const url of candidates){
        try{
          const res = await fetch(url, { cache: "no-store" });
          if (!res.ok) continue;
          return await res.json();
        }catch(e){
          // try next
        }
      }
      showError("Konnte eloRanglisteDetailed.json nicht laden.");
      return null;
    }

    // ========= Your Match Format: Array(11) =========
    // [date, t1p1, t1elo1, t1p2, t1elo2, t2p1, t2elo1, t2p2, t2elo2, r1, r2]
    function parseMatch(arr){
      return {
        date: arr[0],
        t1p1: arr[1], t1e1: Number(arr[2]),
        t1p2: arr[3], t1e2: Number(arr[4]),
        t2p1: arr[5], t2e1: Number(arr[6]),
        t2p2: arr[7], t2e2: Number(arr[8]),
        r1: arr[9], r2: arr[10],
        result: String(arr[9]) + "-" + String(arr[10])
      };
    }

    function selectedEloFromMatch(m, player){
      if (m.t1p1 === player) return m.t1e1;
      if (m.t1p2 === player) return m.t1e2;
      if (m.t2p1 === player) return m.t2e1;
      if (m.t2p2 === player) return m.t2e2;
      return NaN;
    }

    function buildChronAsc(matchesArr, player){
      const parsed = [];
      for (let i=0; i<matchesArr.length; i++){
        const m = parseMatch(matchesArr[i]);
        const sel = selectedEloFromMatch(m, player);
        if (!Number.isFinite(sel)) continue;

        parsed.push({
          ...m,
          selectedElo: sel,
          _origIndex: i
        });
      }

      // Stable sort by date then original index
      parsed.sort((a,b) => {
        if (a.date === b.date) return a._origIndex - b._origIndex;
        return a.date.localeCompare(b.date);
      });

      // Delta
      for (let i=0; i<parsed.length; i++){
        parsed[i].delta = (i === 0) ? NaN : (parsed[i].selectedElo - parsed[i-1].selectedElo);
        parsed[i]._chartIndex = i; // index in chronAsc for chart focus
      }
      return parsed;
    }

    // ========= KPI =========
    function updateKPIs(chronAsc){
      const games = chronAsc.length;
      $("kpi-games").textContent = String(games);

      if (!games){
        $("kpi-current").textContent = "–";
        $("kpi-change").textContent = "–";
        $("kpi-peak").textContent = "–";
        $("kpi-current-date").textContent = "";
        $("kpi-first").textContent = "";
        $("kpi-peak-date").textContent = "";
        $("kpi-change").style.color = "";
        return;
      }

      const first = chronAsc[0];
      const last = chronAsc[games - 1];
      const change = last.selectedElo - first.selectedElo;

      let peak = first;
      for (const m of chronAsc){
        if (m.selectedElo > peak.selectedElo) peak = m;
      }

      $("kpi-current").textContent = fmtElo(last.selectedElo);
      $("kpi-current-date").textContent = "Stand: " + last.date;

      $("kpi-change").textContent = (change >= 0 ? "+" : "") + change.toFixed(1);
      $("kpi-change").style.color = change >= 0 ? "var(--pos)" : "var(--neg)";
      $("kpi-first").textContent = "Start: " + first.date + " (" + fmtElo(first.selectedElo) + ")";

      $("kpi-peak").textContent = fmtElo(peak.selectedElo);
      $("kpi-peak-date").textContent = "Datum: " + peak.date;
    }

    // ========= Chart =========
    let chart = null;

    function destroyChart(){
      if (chart){
        try{ chart.dispose(); }catch(e){}
        chart = null;
      }
    }

    function renderChart(chronAsc, playerName){
      const container = $("eloChart");

      if (typeof window.echarts === "undefined"){
        destroyChart();
        setChartStatus("Diagramm nicht verfügbar");
        showChartHint(
          "ECharts konnte nicht geladen werden. " +
          "Empfohlen: Datei lokal ablegen unter ./vendor/echarts.min.js (im Repo), " +
          "damit Adblock/Tracking-Prevention nicht stört."
        );
        container.innerHTML = "";
        return;
      }

      hideChartHint();
      setChartStatus("Diagramm bereit");

      if (!chart){
        chart = echarts.init(container);
        window.addEventListener("resize", () => chart && chart.resize());
      }

      const points = chronAsc.map(m => [m.date, m.selectedElo]);

      const option = {
        title: {
          text: "Elo-Verlauf: " + playerName,
          left: "center",
          textStyle: { fontWeight: 800, fontSize: 14 }
        },
        tooltip: {
          trigger: "axis",
          axisPointer: { type: "line" },
          formatter: function(params){
            const p = params && params[0];
            if (!p) return "";
            const idx = p.dataIndex;
            const m = chronAsc[idx];
            const d = fmtDelta(m.delta);
            return (
              "<b>" + m.date + "</b><br/>" +
              "Elo: <b>" + fmtElo(m.selectedElo) + "</b> (" + d + ")<br/>" +
              "Ergebnis: " + m.result + "<br/>" +
              "<span style='color:#6b7280'>T1: " + m.t1p1 + " / " + m.t1p2 +
              " — T2: " + m.t2p1 + " / " + m.t2p2 + "</span>"
            );
          }
        },
        grid: { left: 45, right: 15, top: 55, bottom: 55 },
        xAxis: { type: "time" },
        yAxis: { type: "value", scale: true },
        dataZoom: [
          { type: "inside", xAxisIndex: 0 },
          { type: "slider", xAxisIndex: 0, height: 18, bottom: 20 }
        ],
        series: [{
          name: "Elo",
          type: "line",
          data: points,
          showSymbol: false,
          smooth: true,
          lineStyle: { width: 2, color: "#2563eb" },
          areaStyle: { opacity: 0.08, color: "#2563eb" }
        }]
      };

      chart.setOption(option, true);
    }

    function focusChartIndex(idx){
      if (!chart) return;
      try{
        chart.dispatchAction({ type: "showTip", seriesIndex: 0, dataIndex: idx });
        chart.dispatchAction({ type: "highlight", seriesIndex: 0, dataIndex: idx });
      }catch(e){}
    }

    // ========= Table =========
    let sortDir = "desc"; // newest first default

    function renderTable(chronAsc){
      const tbody = document.querySelector("#player-table tbody");
      tbody.innerHTML = "";

      const limit = Number($("rows").value || 100);

      // view is either chronAsc or reversed (desc)
      const view = (sortDir === "desc") ? chronAsc.slice().reverse() : chronAsc.slice();
      const sliced = view.slice(0, limit);

      for (const m of sliced){
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${m.date}</td>
          <td>${m.t1p1}</td>
          <td class="num">${fmtElo(m.t1e1)}</td>
          <td>${m.t1p2}</td>
          <td class="num">${fmtElo(m.t1e2)}</td>
          <td>${m.t2p1}</td>
          <td class="num">${fmtElo(m.t2e1)}</td>
          <td>${m.t2p2}</td>
          <td class="num">${fmtElo(m.t2e2)}</td>
          <td class="num delta ${deltaClass(m.delta)}">${fmtDelta(m.delta)}</td>
          <td class="num">${m.result}</td>
        `;

        tr.addEventListener("click", () => focusChartIndex(m._chartIndex));
        tbody.appendChild(tr);
      }
    }

    // ========= Player Filter =========
    function applyPlayerFilter(allPlayers, filterText){
      const q = (filterText || "").trim().toLowerCase();
      if (!q) return allPlayers;
      return allPlayers.filter(p => p.toLowerCase().includes(q));
    }

    function fillPlayerSelect(players, selected){
      const sel = $("player");
      sel.innerHTML = players.map(p => `<option value="${p}">${p}</option>`).join("");
      if (players.includes(selected)) sel.value = selected;
      else sel.value = players[0] || "";
    }

    // ========= App State =========
    let data = null;
    let allPlayers = [];
    let currentChronAsc = [];

    function updateUI(){
      clearError();

      if (!data || !data.player_data){
        showError("Datenformat unerwartet: 'player_data' nicht gefunden.");
        return;
      }

      const player = $("player").value;
      const matches = data.player_data[player];

      if (!Array.isArray(matches)){
        showError("Spielerdaten sind kein Array für: " + player);
        return;
      }

      currentChronAsc = buildChronAsc(matches, player);
      updateKPIs(currentChronAsc);
      renderTable(currentChronAsc);
      renderChart(currentChronAsc, player);

      safePostHeight();
    }

    async function initChart(){
      setChartStatus("Diagramm wird geladen…");
      const result = await ensureECharts();

      if (result.ok){
        setChartStatus("Diagramm geladen");
        hideChartHint();
      }else{
        setChartStatus("Diagramm nicht verfügbar");
      }

      // Re-render chart if we already have data on screen
      if (currentChronAsc.length && $("player").value){
        renderChart(currentChronAsc, $("player").value);
      }
    }

    // ========= Init =========
    document.addEventListener("DOMContentLoaded", async () => {
      // load data
      data = await fetchData();
      if (!data) return;

      if (!data.player_data){
        showError("JSON geladen, aber 'player_data' fehlt.");
        return;
      }

      // Build players list
      allPlayers = Object.keys(data.player_data).sort((a,b) => a.localeCompare(b, "de"));

      // Select initial player from URL (player=...), else first
      const fromUrl = getPlayerFromUrl(allPlayers);
      const initialPlayer = fromUrl || allPlayers[0];

      fillPlayerSelect(allPlayers, initialPlayer);

      // Sync URL immediately (also fixes missing/invalid query)
      setPlayerToUrl($("player").value);

      // UI events
      $("player").addEventListener("change", () => {
        setPlayerToUrl($("player").value);
        updateUI();
      });

      $("rows").addEventListener("change", updateUI);

      $("sortDate").addEventListener("click", () => {
        sortDir = (sortDir === "desc") ? "asc" : "desc";
        updateUI();
      });

      $("playerFilter").addEventListener("input", (ev) => {
        const current = $("player").value;
        const filtered = applyPlayerFilter(allPlayers, ev.target.value);
        fillPlayerSelect(filtered, current);

        if ($("player").value){
          setPlayerToUrl($("player").value);
          updateUI();
        }
      });

      $("retryChart").addEventListener("click", async () => {
        // allow retry - maybe user disabled blocker etc.
        await initChart();
      });

      // Back/Forward support (popstate fired on navigation through session history). [3](https://linuxvox.com/blog/wget-a-raw-file-from-github-from-a-private-repo/)
      window.addEventListener("popstate", () => {
        const p = getPlayerFromUrl(allPlayers);
        if (p && $("player").value !== p){
          // Ensure player exists in select: clear filter and refill full list
          $("playerFilter").value = "";
          fillPlayerSelect(allPlayers, p);
          updateUI();
        }
      });

      // First render
      updateUI();

      // Load ECharts after initial table render (so UI always shows something)
      await initChart();
    });
  </script>
</body>
</html>
